name: Update Direct List

on:
  schedule:
    # Запуск каждую ночь в 2:15 UTC (чуть позже первого скрипта, чтобы они не сталкивались)
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-direct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Python script
        run: python update_direct_list.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add my_custom_direct_list.list
          git commit -m "Auto-update direct list" || echo "No changes to commit"
          git push
